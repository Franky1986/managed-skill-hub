openapi: 3.1.0
info:
  title: ManagedSkillHub API
  description: Self-hosted skill registry for AI agents.
  version: 0.1.0
servers:
  - url: http://localhost:3040
    description: Local API server
x-managed-skill-hub-runtime-auth:
  description: >-
    Agent-facing operation security is selected at runtime. The static security arrays enumerate credentialed modes
    only; anonymous access is enabled only when the corresponding environment selector is `none`.
  selectors:
    discovery: DISCOVERY_AUTH_MODE
    publicRead: PUBLIC_READ_AUTH_MODE
    proposal: PROPOSAL_AUTH_MODE
  supportedModes:
    - none
    - bearer
    - oidc
paths:
  /api/health:
    get:
      operationId: getHealth
      tags:
        - Health
      summary: API Healthcheck
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /discover:
    get:
      operationId: discover
      tags:
        - Discovery
      summary: Registry discovery endpoint
      description: >-
        Returns registry identity, canonical API base URL, entrypoints, and runtime auth requirements. May require
        discoveryBearer when DISCOVERY_AUTH_MODE=bearer or an Authentik access token with the advertised discovery
        scope when DISCOVERY_AUTH_MODE=oidc.
      security:
        - discoveryBearer: []
        - agentOidc:
            - managedskillhub:discovery
      responses:
        '200':
          description: Registry metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /howToPropose:
    get:
      operationId: getHowToPropose
      tags:
        - Proposals
      summary: Get proposal workflow instructions for agents
      description: >-
        Returns proposal workflow and runtime proposal auth guidance. May require discoveryBearer when
        DISCOVERY_AUTH_MODE=bearer or agentOidc when DISCOVERY_AUTH_MODE=oidc.
      security:
        - discoveryBearer: []
        - agentOidc:
            - managedskillhub:discovery
      responses:
        '200':
          description: Recommended proposal workflow for agents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HowToProposeResponse'
              examples:
                default:
                  value:
                    id: how-to-propose
                    title: Proposal workflow for agents
                    summary: Mandatory preflight before submit
                    description: >-
                      Read this endpoint before every proposal upload. Agents must communicate with the user in the
                      language the user is currently using, validate the local package, normalize it only when needed,
                      ensure SKILL.md is the root entrypoint, keep dependency installation artifacts out of the uploaded
                      package, verify self-contained references, scan for credentials or PII, and only then continue to
                      duplicate prechecks and submission.
                    conversationLanguage: >-
                      When communicating with the user, use the language the user is currently using unless the user
                      explicitly asks for another language.
                    metadataLanguageGuidance: >-
                      Proposal metadata should preferably be written in English: title, description, category, tags,
                      capabilities, useWhen and doNotUseWhen. Uploaded content files may be in any language.
                    escalationRule: >-
                      Do not proceed with proposal creation while the package is structurally ambiguous, references are
                      broken, sensitive content is present, or duplicate intent is unconfirmed.
                    duplicateConfirmationRule:
                      appliesWhen:
                        - exactDuplicateProposalId is set
                        - exactDuplicateSkillId is set
                        - skillIdCollision.exists is true
                        - similarMatches contains a strong title/description intent match
                      requiredUserFacingSummary:
                        - >-
                          Name each relevant duplicate candidate with kind, id, skillId/title when available,
                          status/version when available, and similarity score for similar matches.
                        - >-
                          Summarize the core overlap including matching title or intent, shared category, shared
                          tags/capabilities, matching entrypoint, and exact content digest when available.
                        - >-
                          Summarize what would change if uploaded, including resolution option, metadata changes, file
                          additions/removals, or changed file fingerprints.
                        - Provide a concise diff from duplicate-check differences and local file fingerprint comparison.
                      confirmationRequired: >-
                        Ask the user explicitly whether to upload despite the duplicate or choose one of the returned
                        resolutionOptions. Do not call POST /proposals until the user confirms.
                    normalizationRules:
                      entrypointFile: SKILL.md
                      packageRoot: proposal package root
                      normalizeOnlyWhenNeeded: true
                      preserveUsefulSubfolders: true
                      transparentToSubmitter: true
                    packageHandling:
                      principle: >-
                        Upload source artifacts and setup manifests, not initialized package-manager outputs. The later
                        consumer of the skill is responsible for dependency installation in their own environment.
                      disallowedInstalledPaths:
                        - node_modules/
                        - .venv/
                        - venv/
                        - vendor/
                        - dist-packages/
                        - site-packages/
                      allowedManifestFiles:
                        - package.json
                        - package-lock.json
                        - pnpm-lock.yaml
                        - yarn.lock
                        - pyproject.toml
                        - poetry.lock
                        - requirements.txt
                        - Pipfile.lock
                      submitterResponsibility: >-
                        The uploaded proposal may document how dependencies should be installed later, but it should not
                        contain preinstalled packages or environment snapshots.
                    requiredSteps:
                      - step: 1
                        title: Read this workflow first
                        checks:
                          - GET /howToPropose is mandatory before POST /proposals
                      - step: 2
                        title: Use the user conversation language
                        checks:
                          - Use English API and contract fields as documented
                          - Respond to the user in the language they are currently using
                      - step: 3
                        title: Inspect the local package
                        checks:
                          - Determine whether the package already matches the upload contract
                          - >-
                            Detect installed dependency folders such as node_modules, .venv, venv, vendor,
                            dist-packages, or site-packages
                          - >-
                            Detect references outside the effective skill root, such as parent-directory references,
                            absolute local paths, IDE/agent workspace folders, command folders, generated-output
                            folders, or other project-root-relative paths
                          - >-
                            If an outside-root reference points to a required artifact, copy it into the
                            temporary upload package and rewrite the reference to a package-relative path
                          - >-
                            If a runtime command reference points to .cursor/commands, .codex/commands, or
                            .claude/commands and is relevant to using the skill, copy or merge it into
                            commands/ and add commands/manifest.json
                          - >-
                            If the source package already contains commands/, preserve existing command
                            files, compare collisions, and do not silently overwrite command artifacts
                          - Keep dependency manifests and lockfiles, but do not upload installed package trees
                      - step: 4
                        title: Normalize only when needed
                        checks:
                          - Final entrypoint must be SKILL.md in the package root
                          - Preserve meaningful subfolders such as commands/, scripts/, docs/, templates/, examples/, assets/, or prompts/
                          - Rewrite workspace-root, IDE-specific, agent-specific, and generated-output references to package-relative references in the temporary upload copy
                          - Rewrite active runtime command references to commands/<name>.md when the command ships with the package
                          - Strip installed dependency folders from the temporary upload package
                      - step: 5
                        title: Prefer English proposal metadata
                        checks:
                          - Prefer English for title, description, category, tags and capabilities
                          - Uploaded content files may be in any language
                      - step: 6
                        title: Validate self-contained and safe content
                        checks:
                          - No required artifact reference may still resolve outside the temporary upload package root
                          - Broken references, credentials or PII must block the upload
                      - step: 7
                        title: Build and prove the final upload package before network upload
                        checks:
                          - Create a temporary upload package if normalization was needed
                          - Recursively scan every readable file in the final package before POST /proposals
                          - >-
                            Scan for .cursor/skills, .cursor/commands, .codex/commands,
                            .claude/commands, CursorProjects, /Users, ../, absolute local paths,
                            Markdown links, Markdown inline-code file paths, and JSON path/source fields
                          - >-
                            Verify every required package reference exists, runtime output examples use
                            placeholders, and relevant command shortcuts are packaged under commands/
                          - Compute sha256 values from the final temporary upload package after normalization
                          - Do not call POST /proposals until this local package proof is complete
                      - step: 8
                        title: Search the public catalog exploratively
                        checks:
                          - GET /skills/search?q=<title>&mode=keyword
                          - GET /skills/search?q=<short description keywords>&mode=keyword
                          - Inspect matching descriptions and public files when relevant
                      - step: 9
                        title: Run duplicate precheck
                        checks:
                          - POST /proposals/check-duplicate
                          - Stop on exact duplicates, skill-id collisions, or strong intent matches
                          - >-
                            Show duplicate candidate, overlap, intended resolution, and concise
                            metadata/file-fingerprint diff before asking
                      - step: 10
                        title: Create proposal only after confirmation
                        checks:
                          - Final temporary upload package is complete, locally scanned, normalized, and hashed
                          - POST /proposals opens an in_upload proposal
                          - POST /proposals/{id}/files attaches files within configured limits
                          - POST /proposals/{id}/validate-upload returns all package findings without finalizing
                          - >-
                            POST /proposals/{id}/finalize-upload explicitly marks the package complete and starts
                            judgement
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /agent-credentials/setup.sh:
    get:
      operationId: getAgentCredentialSetupScript
      tags:
        - Discovery
      summary: Download a local ManagedSkillHub credential setup script
      description: >-
        Generates a no-secret shell script for this registry URL and active auth requirements. By default the script
        opens a local browser form with only the token fields required by the current config; --terminal uses terminal
        prompts. It updates ~/.managed-skill-hub/credentials.json per registry alias/base URL.
      responses:
        '200':
          description: Shell setup script
          content:
            text/x-shellscript:
              schema:
                type: string
  /skills/suggest-name:
    get:
      operationId: suggestSkillName
      security: &publicReadSecurity
        - publicReadBearer: []
        - agentOidc:
            - managedskillhub:skills:read
      tags:
        - Skills
      summary: Suggest a valid Skill ID
      parameters:
        - name: title
          in: query
          required: true
          schema:
            type: string
        - name: description
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Suggested names
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillNameSuggestionResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '422':
          $ref: '#/components/responses/ValidationError'
  /skills:
    get:
      operationId: listSkills
      security: *publicReadSecurity
      tags:
        - Skills
      summary: List published skills
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: tag
          in: query
          description: Filter by tags. Repeat the parameter to require multiple tags.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of published skills
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /skills/search:
    get:
      operationId: searchSkills
      security: *publicReadSecurity
      tags:
        - Skills
      summary: Search published skills
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: mode
          in: query
          schema:
            type: string
            enum:
              - keyword
              - fulltext
              - regex
            default: keyword
        - name: category
          in: query
          schema:
            type: string
        - name: tag
          in: query
          description: Filter by tags. Repeat the parameter to require multiple tags.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillSearchResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /categories:
    get:
      operationId: listCategories
      security: *publicReadSecurity
      tags:
        - Skills
      summary: List known skill categories
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /tags:
    get:
      operationId: listTags
      security: *publicReadSecurity
      tags:
        - Skills
      summary: List known skill tags
      responses:
        '200':
          description: Tag list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /skills/{skillId}:
    get:
      operationId: getSkill
      security: *publicReadSecurity
      tags:
        - Skills
      summary: Get published skill
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Skill details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /skills/{skillId}/manifest:
    get:
      operationId: getSkillManifest
      security: *publicReadSecurity
      tags:
        - Skills
      summary: Get skill manifest
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Skill manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Manifest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /skills/{skillId}/package:
    get:
      operationId: downloadSkillPackage
      security: *publicReadSecurity
      tags:
        - Skills
      summary: Download a published skill package
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: query
          description: Optional published version. Omit to use latest published.
          schema:
            type: string
      responses:
        '200':
          description: Skill package or single SKILL.md file
          content:
            application/zip:
              schema:
                type: string
                format: binary
            text/markdown:
              schema:
                type: string
                format: binary
            text/plain:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /skills/{skillId}/files:
    get:
      operationId: listSkillFiles
      security: *publicReadSecurity
      tags:
        - Skills
      summary: List skill files
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillFileListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /skills/{skillId}/files/{fileId}:
    get:
      operationId: getSkillFile
      security: *publicReadSecurity
      tags:
        - Skills
      summary: Download a skill file
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: string
        - name: fileId
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: query
          schema:
            type: string
      responses:
        '200':
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /skills/{skillId}/files/{fileId}/extracted-content:
    get:
      operationId: getSkillFileExtractedContent
      security: *publicReadSecurity
      tags:
        - Skills
      summary: Get extracted text for an extractable published skill file
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: string
        - name: fileId
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Extracted file content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractedContentResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
  /skills/{skillId}/files/{fileId}/probe:
    get:
      operationId: getSkillFileProbe
      security: *publicReadSecurity
      tags:
        - Skills
      summary: Probe a published skill file with ffprobe
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: string
        - name: fileId
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Probe output and parsed summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
  /skills/{skillId}/deprecation:
    get:
      operationId: getSkillDeprecation
      security: *publicReadSecurity
      tags:
        - Skills
      summary: Public deprecation info for a published skill version
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Deprecation information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillDeprecationInfoResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /skills/{skillId}/versions:
    get:
      operationId: listSkillVersions
      security: *publicReadSecurity
      tags:
        - Skills
      summary: List versions of a skill
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillVersionListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /skills/{skillId}/history:
    get:
      operationId: getSkillHistory
      security: *publicReadSecurity
      tags:
        - Skills
      summary: Get audit history of a skill
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Audit history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /proposals/check-duplicate:
    post:
      operationId: checkDuplicateProposal
      tags:
        - Proposals
      summary: Pre-submission duplicate and similarity check
      description: |
        May require proposalBearer when PROPOSAL_AUTH_MODE=bearer or agentOidc when PROPOSAL_AUTH_MODE=oidc.
        Checks whether an identical or similar proposal/skill already exists before creating a proposal.
        Agents should call this endpoint before submitting. Submission is not blocked by matches;
        the response only provides transparency about existing content and skill id collisions.
      security:
        - proposalBearer: []
        - agentOidc:
            - managedskillhub:proposals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckDuplicateProposalRequest'
      responses:
        '200':
          description: Duplicate check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckDuplicateProposalResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '422':
          $ref: '#/components/responses/ValidationError'
  /proposals:
    post:
      operationId: submitProposal
      tags:
        - Proposals
      summary: Submit a new proposal
      description: May require proposalBearer when PROPOSAL_AUTH_MODE=bearer or agentOidc when PROPOSAL_AUTH_MODE=oidc.
      security:
        - proposalBearer: []
        - agentOidc:
            - managedskillhub:proposals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitProposalRequest'
      responses:
        '201':
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalSubmissionResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'
  /proposals/notice:
    get:
      operationId: getProposalNotice
      tags:
        - Proposals
      summary: Show whether new proposals are waiting for admin review
      description: May require proposalBearer when PROPOSAL_AUTH_MODE=bearer or agentOidc when PROPOSAL_AUTH_MODE=oidc.
      security:
        - proposalBearer: []
        - agentOidc:
            - managedskillhub:proposals
      responses:
        '200':
          description: Aggregated proposal notice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalNoticeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'
  /proposals/{proposalId}/status:
    get:
      operationId: getProposalStatus
      tags:
        - Proposals
      summary: Public proposal status lookup
      description: >-
        May require proposalBearer when PROPOSAL_AUTH_MODE=bearer or any allowed agentOidc proposal principal when
        PROPOSAL_AUTH_MODE=oidc. Knowing the UUID is insufficient without the configured authentication.
      security:
        - proposalBearer: []
        - agentOidc:
            - managedskillhub:proposals
      parameters:
        - name: proposalId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Public proposal status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalPublicStatusResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /proposals/{proposalId}:
    patch:
      operationId: updateOpenProposalMetadata
      tags:
        - Proposals
      summary: Update metadata for an open proposal upload
      description: >-
        May require proposalBearer when PROPOSAL_AUTH_MODE=bearer or the owning agentOidc principal when oidc. Only proposals still in `in_upload` can be
        updated through this public submitter path. Agents should use this after submitter-side post-checks when title,
        description, category, tags, capabilities, or entrypoint need correction before finalization.
      security:
        - proposalBearer: []
        - agentOidc:
            - managedskillhub:proposals
      parameters:
        - name: proposalId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProposalMetadataUpdateRequest'
      responses:
        '200':
          description: Proposal metadata updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalMetadataUpdateResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      operationId: deleteOpenProposalUpload
      tags:
        - Proposals
      summary: Abort and delete an open proposal upload
      description: >-
        May require proposalBearer when PROPOSAL_AUTH_MODE=bearer or the owning agentOidc principal when oidc. Only proposals still in `in_upload` can be deleted
        through this submitter path. After finalize-upload, public proposal deletion is blocked.
      security:
        - proposalBearer: []
        - agentOidc:
            - managedskillhub:proposals
      parameters:
        - name: proposalId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Open proposal upload deleted
        '401':
