  /proposals/{proposalId}/files:
    post:
      operationId: attachProposalFile
      tags:
        - Proposals
      summary: Attach a file to a proposal
      description: >-
        May require proposalBearer when PROPOSAL_AUTH_MODE=bearer or the owning agentOidc principal when oidc. Attach one proposal artifact. When the file belongs
        in a subfolder, send multipart field `path` with the relative in-package path such as `scripts/build.py`.
        While the proposal is still `in_upload`, sending the same relative path again replaces that file so agents can
        apply post-check corrections without creating another proposal.
      security:
        - proposalBearer: []
        - agentOidc:
            - managedskillhub:proposals
      parameters:
        - name: proposalId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                path:
                  type: string
                  description: >-
                    Optional relative in-package path. Use this to preserve subfolders like scripts/, templates/, docs/,
                    or assets/ during upload.
      responses:
        '200':
          description: File attached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalAttachmentResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
  /proposals/{proposalId}/validate-upload:
    post:
      operationId: validateProposalUpload
      tags:
        - Proposals
      summary: Validate an open proposal upload without finalizing
      description: >-
        May require proposalBearer when PROPOSAL_AUTH_MODE=bearer or the owning agentOidc principal when oidc. Checks the currently uploaded package while the
        proposal is still `in_upload`, returns all package-reference findings, and does not finalize the upload, run
        extraction, run judgement, or change proposal status. Agents should call this before finalize-upload and apply
        corrections through PATCH /proposals/{proposalId} or POST /proposals/{proposalId}/files upserts.
      security:
        - proposalBearer: []
        - agentOidc:
            - managedskillhub:proposals
      parameters:
        - name: proposalId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
