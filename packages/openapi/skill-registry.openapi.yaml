          $ref: '#/components/responses/NotFoundError'
components:
  securitySchemes:
    adminSession:
      type: apiKey
      in: cookie
      name: skill_hub_session
    publicReadBearer:
      type: http
      scheme: bearer
      description: Runtime-configurable bearer token for published skill consumption when PUBLIC_READ_AUTH_MODE=bearer.
    proposalBearer:
      type: http
      scheme: bearer
      description: >-
        Runtime-configurable bearer token for proposal duplicate check, submit, upload, finalization, notices, and
        status when PROPOSAL_AUTH_MODE=bearer.
    discoveryBearer:
      type: http
      scheme: bearer
      description: Runtime-configurable bearer token for discovery/contract endpoints when DISCOVERY_AUTH_MODE=bearer.
    agentOidc:
      type: openIdConnect
      openIdConnectUrl: https://auth.example.invalid/application/o/managedskillhub-agent-device/.well-known/openid-configuration
      description: >-
        Runtime Authentik access token. The concrete issuer, client ID, scopes, Device Authorization endpoint, token
        endpoint, and OpenID configuration URL must be read from /discover; this static URL is intentionally only a
        contract placeholder.
      x-device-authorization:
        flow: device_code
        runtimeMetadataPath: /discover
        verificationLinkField: verification_uri_complete
        deviceCodeIsSecret: true
  responses:
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: Conflict error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Authenticated actor is not allowed to access this resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimitError:
      description: Rate limit exceeded
      headers:
        Retry-After:
          description: Seconds until the current rate-limit window resets.
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - version
      properties:
        status:
          type: string
        version:
          type: string
        timestamp:
          type: string
          format: date-time
    DiscoveryResponse:
      type: object
      required:
        - name
        - version
        - description
        - registryId
        - registryName
        - apiBaseUrl
        - readAuthRequired
        - proposalAuthRequired
        - discoveryAuthRequired
        - documentation
        - capabilities
        - entrypoints
      properties:
        name:
          type: string
        registryId:
          type: string
        registryName:
          type: string
        apiBaseUrl:
          type: string
        version:
          type: string
        description:
          type: string
        proposalAuthRequired:
          type: boolean
        discoveryAuthRequired:
          type: boolean
        authSchemes:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeAuthScheme'
        credentialSetupScriptUrl:
          type:
            - string
            - 'null'
        workflowNotes:
          type: object
          properties:
            conversationLanguage:
              type: string
            readPath:
              type: string
            proposalPath:
              type: string
            publishedSkillDownload:
              type: string
            howToProposeUrl:
              type: string
            frontendUrl:
              type: string
            adminOnlyActions:
              type: array
              items:
                type: string
        readAuthRequired:
          type: boolean
        documentation:
          type: object
          required:
            - human
            - openapi
            - frontend
          properties:
            human:
              type: string
              format: uri
            openapi:
              type: string
            frontend:
              type: string
        capabilities:
          type: array
          items:
            type: object
            required:
              - id
              - name
              - description
            properties:
              id:
                type: string
              name:
                type: string
              description:
                type: string
        entrypoints:
          type: array
          items:
            type: object
            required:
              - id
              - name
              - description
              - methods
              - path
              - url
            properties:
              id:
                type: string
              name:
                type: string
              description:
                type: string
              methods:
                type: array
                items:
                  type: string
                  enum:
                    - GET
                    - POST
                    - PATCH
                    - PUT
                    - DELETE
              path:
                type: string
              url:
                type: string
    RuntimeAuthScheme:
      type: object
      required:
        - id
        - type
        - appliesTo
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - bearer
            - oauth2
        flow:
          type: string
          enum:
            - device_code
        issuer:
          type: string
          format: uri
        openIdConfigurationUrl:
          type: string
          format: uri
        authorizationEndpoint:
          type: string
          format: uri
        deviceAuthorizationEndpoint:
          type: string
          format: uri
        tokenEndpoint:
          type: string
          format: uri
        clientId:
          type: string
        scopes:
          type: array
          items:
            type: string
        appliesTo:
          type: array
          items:
            type: string
            enum:
              - discovery
              - public-read
              - proposal
    HowToProposeResponse:
      type: object
      required:
        - id
        - title
        - summary
        - description
        - requiredSteps
        - escalationRule
        - duplicateConfirmationRule
        - normalizationRules
        - packageHandling
        - uploadLimits
        - uploadFinalization
      properties:
        id:
          type: string
        title:
          type: string
        summary:
          type: string
        description:
          type: string
        conversationLanguage:
          type: string
        metadataLanguageGuidance:
          type: string
        requiredSteps:
          type: array
          items:
            type: object
            required:
              - step
              - title
              - purpose
              - checks
            properties:
              step:
                type: integer
              title:
                type: string
              purpose:
                type: string
              checks:
                type: array
                items:
                  type: string
        escalationRule:
          type: string
        duplicateConfirmationRule:
          type: object
          properties:
            appliesWhen:
              type: array
              items:
                type: string
            requiredUserFacingSummary:
              type: array
              items:
                type: string
            confirmationRequired:
              type: string
        normalizationRules:
          type: object
          required:
            - entrypointFile
            - packageRoot
            - normalizeOnlyWhenNeeded
            - preserveUsefulSubfolders
            - transparentToSubmitter
          properties:
            entrypointFile:
              type: string
            packageRoot:
              type: string
            normalizeOnlyWhenNeeded:
              type: boolean
            preserveUsefulSubfolders:
              type: boolean
            transparentToSubmitter:
              type: boolean
        packageHandling:
          type: object
          required:
            - principle
            - disallowedInstalledPaths
            - allowedManifestFiles
            - submitterResponsibility
          properties:
            principle:
              type: string
            disallowedInstalledPaths:
              type: array
              items:
                type: string
            allowedManifestFiles:
              type: array
              items:
                type: string
            submitterResponsibility:
              type: string
        uploadLimits:
          type: object
          required:
            - maxFiles
            - maxFileSizeBytes
            - disallowedPaths
            - recommendations
          properties:
            maxFiles:
              type: integer
            maxFileSizeBytes:
              type: integer
            disallowedPaths:
              type: array
              items:
                type: string
            recommendations:
              type: array
              items:
                type: string
        uploadFinalization:
          type: object
          required:
            - required
            - finalizeEndpoint
            - statusFollowUp
          properties:
            required:
              type: boolean
            finalizeEndpoint:
              type: string
            statusFollowUp:
              type: string
        uploadGuardrails:
          type: array
          items:
            type: string
        apiNotes:
          type: object
          properties:
            signInRequiredForSubmitter:
              type: boolean
            publicOnly:
              type: boolean
            registryId:
              type: string
            registryName:
              type: string
            apiBaseUrl:
              type: string
            readAuthRequired:
              type: boolean
            proposalAuthRequired:
              type: boolean
            discoveryAuthRequired:
              type: boolean
            credentialSetupScriptUrl:
              type:
                - string
                - 'null'
            authorizationHeader:
              type:
                - string
                - 'null'
            authSetupFlow:
              type: string
            checkDuplicateNote:
              type: string
    SkillNameSuggestionRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
    SkillNameSuggestionResponse:
      type: object
      required:
        - suggestion
        - alternatives
        - isAvailable
      properties:
        suggestion:
          type: string
        alternatives:
          type: array
          items:
            type: string
        isAvailable:
          type: boolean
    SkillListResponse:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SkillSummary'
        total:
          type: integer
    SkillSearchResponse:
      type: object
      required:
        - items
        - total
        - mode
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SkillSearchResult'
        total:
          type: integer
        mode:
          type: string
    SkillSummary:
      type: object
      required:
        - id
        - title
        - description
        - category
        - tags
        - skillUuid
        - versionUuid
        - contentDigest
        - version
        - status
        - publishedAt
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        skillUuid:
          type: string
          format: uuid
        versionUuid:
          type: string
          format: uuid
        contentDigest:
          type: string
        version:
          type: string
        status:
          type: string
          enum:
            - draft
            - in_review
            - approved
            - rejected
            - published
            - deprecated
        publishedAt:
          type: string
          format: date-time
          nullable: true
    SkillSearchResult:
      allOf:
        - $ref: '#/components/schemas/SkillSummary'
        - type: object
          properties:
            score:
              type: number
    SkillResponse:
      type: object
      required:
        - id
        - title
        - description
        - category
        - tags
        - capabilities
        - useWhen
        - doNotUseWhen
        - entrypoint
        - skillUuid
        - latestPublishedVersion
        - versions
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        capabilities:
          type: array
          items:
            type: string
        useWhen:
          type: array
          items:
            type: string
        doNotUseWhen:
          type: array
          items:
            type: string
        entrypoint:
          type: string
        skillUuid:
          type: string
          format: uuid
        latestPublishedVersion:
          type: string
          nullable: true
        versions:
          type: array
          items:
            $ref: '#/components/schemas/SkillVersionSummary'
    SkillVersionSummary:
      type: object
      required:
        - version
        - versionUuid
        - contentDigest
        - status
        - createdAt
      properties:
        version:
          type: string
        versionUuid:
          type: string
          format: uuid
        contentDigest:
          type: string
        status:
          type: string
          enum:
            - draft
            - in_review
            - approved
            - rejected
            - published
            - deprecated
        createdAt:
          type: string
          format: date-time
        approvedBy:
          type: string
          nullable: true
        approvedAt:
          type: string
          format: date-time
          nullable: true
        publishedBy:
          type: string
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
        rejectedBy:
          type: string
          nullable: true
        rejectedAt:
          type: string
          format: date-time
          nullable: true
        rejectionReason:
          type: string
          nullable: true
        deprecatedBy:
          type: string
          nullable: true
        deprecatedAt:
          type: string
          format: date-time
          nullable: true
        deprecationReason:
          type: string
          nullable: true
    SkillVersionListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SkillVersionSummary'
    Manifest:
      type: object
      required:
        - id
        - title
