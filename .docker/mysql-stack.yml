services:
  managed-skill-hub-mysql:
    image: mysql:8.4
    container_name: managed-skill-hub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin_root_password
      MYSQL_DATABASE: managed_skill_hub
      MYSQL_USER: managed_skill_hub
      MYSQL_PASSWORD: valpass
    ports:
      - "33307:3306"
    volumes:
      - managed-skill-hub-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-padmin_root_password"]
      interval: 2s
      timeout: 5s
      retries: 15

  managed-skill-hub-mysql-phpmyadmin:
    image: phpmyadmin/phpmyadmin:5
    container_name: managed-skill-hub-mysql-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: managed-skill-hub-mysql
      PMA_PORT: 3306
      PMA_USER: managed_skill_hub
      PMA_PASSWORD: valpass
    ports:
      - "33308:80"
    depends_on:
      managed-skill-hub-mysql:
        condition: service_healthy

volumes:
  managed-skill-hub-mysql-data:
