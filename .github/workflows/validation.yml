name: ManagedSkillHub Validation

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      run_mysql_full_check:
        description: 'Run Docker/MySQL full validation gate'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

jobs:
  lightweight-check:
    name: Lightweight deterministic check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run lightweight validation
        run: ./scripts/check.sh

      - name: Build production artifacts
        run: npm run build:prod

      - name: Audit locked production dependency graph
        run: npm audit --audit-level=moderate --package-lock-only

      - name: Upload proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lightweight-proof-artifacts
          path: |
            .tmp/*.log
            .tmp/*.json
          if-no-files-found: warn

  mysql-full-check:
    name: MySQL full validation gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.run_mysql_full_check == 'true')
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: admin_root_password
          MYSQL_DATABASE: managed_skill_hub
          MYSQL_USER: managed_skill_hub
          MYSQL_PASSWORD: valpass
        ports:
          - 33307:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -padmin_root_password"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run full MySQL validation
        env:
          RUN_MYSQL_FULL_CHECK: 'true'
          SKIP_MYSQL_STACK_START: 'true'
        run: ./scripts/full-check.sh

      - name: Upload full proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mysql-full-proof-artifacts
          path: |
            .tmp/*.log
            .tmp/*.json
          if-no-files-found: warn
